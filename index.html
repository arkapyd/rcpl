<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rcpl s4</title>
    <style>
        body { 
            font-family: system-ui, sans-serif; 
            background-color: #050505; 
            color: #e0e0e0; 
            margin: 0; 
            padding: 20px; 
        }
        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            display: grid; 
            grid-template-columns: 1fr 2fr; 
            gap: 20px; 
        }
        .left-col {
            display: none; 
        }
        .card { 
            background: #121212; 
            padding: 20px; 
            border-radius: 8px; 
            border: 1px solid #d4af37;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.15); 
            margin-bottom: 20px; 
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
        }
        .card:hover {
            transform: translateY(-4px) scale(1.01);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.25);
        }
        .full-width {
            grid-column: 1 / -1;
        }
        h2, h3 { 
            margin-top: 0; 
            color: #d4af37; 
            text-transform: lowercase;
            transition: color 0.3s ease;
        }
        h2 {
            font-size: 1.2rem; 
            border-bottom: 1px solid #333; 
            padding-bottom: 10px; 
        }
        .card:hover h2 {
            color: #ffdf00;
        }
        .row { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 10px; 
        }
        .row > div { flex: 1; }
        label { 
            display: block; 
            font-size: 0.8rem; 
            margin-bottom: 4px; 
            color: #aaa; 
            transition: color 0.3s ease;
        }
        input, select { 
            width: 100%; 
            padding: 8px; 
            border: 1px solid #333; 
            border-radius: 4px; 
            background: #1a1a1a; 
            color: #fff; 
            box-sizing: border-box; 
            transition: all 0.3s ease;
        }
        option {
            background: #1a1a1a;
            color: #fff;
        }
        input:hover, select:hover {
            border-color: #888;
            transform: scale(1.02);
        }
        input:focus, select:focus {
            outline: none;
            border-color: #d4af37;
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.4);
            transform: scale(1.02);
        }
        .row > div:hover label {
            color: #d4af37;
        }
        button { 
            width: 100%;
            padding: 10px;
            background: #d4af37; 
            color: #050505; 
            font-weight: bold; 
            cursor: pointer; 
            border: 1px solid #ffdf00; 
            border-radius: 4px;
            margin-top: 10px; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        button:hover { 
            background: #ffdf00; 
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 5px 15px rgba(255, 223, 0, 0.4);
        }
        button:active {
            transform: scale(0.98);
        }
        button.danger { 
            background: transparent; 
            color: #d50000; 
            border: 1px solid #d50000; 
        }
        button.danger:hover {
            background: #d50000;
            color: #fff;
            box-shadow: 0 5px 15px rgba(213, 0, 0, 0.4);
        }
        button.action {
            background: transparent;
            color: #d4af37;
        }
        button.action:hover {
            background: #d4af37;
            color: #050505;
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 0.9rem; 
        }
        th, td { 
            text-align: left; 
            padding: 8px; 
            border-bottom: 1px solid #222; 
            transition: background-color 0.2s ease, color 0.2s ease;
        }
        th { 
            color: #d4af37; 
            font-weight: normal; 
        }
        tbody tr {
            transition: all 0.2s ease;
        }
        tbody tr:hover td {
            background-color: #1e1e1e;
        }
        .flex-split { 
            display: flex; 
            gap: 20px; 
        }
        .flex-split > div { flex: 1; }
        .tag { 
            padding: 2px 6px; 
            border-radius: 4px; 
            font-size: 0.75rem; 
            font-weight: bold; 
        }
        .tag.q { background: #d4af37; color: #050505; }
        .tag.e { background: #333; color: #888; border: 1px solid #444; }
        .tag.form-w { color: #d4af37; font-weight: bold; }
        .tag.form-l { color: #888; font-weight: bold; }
        
        .groups-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .group-box {
            flex: 1;
            background: #121212;
            border: 1px solid #333;
            border-left: 3px solid #d4af37;
            padding: 15px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .group-box:hover {
            transform: translateY(-2px);
            border-color: #555;
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.1);
        }
        .group-box h3 { border-bottom: none; padding-bottom: 0; margin-bottom: 10px; font-size: 1rem; }
        .team-pill {
            display: inline-block;
            padding: 4px 10px;
            margin: 4px 4px 4px 0;
            background: #1a1a1a;
            border: 1px solid #444;
            color: #ccc;
            border-radius: 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: default;
        }
        .team-pill:hover {
            transform: scale(1.1) translateY(-2px);
            border-color: #d4af37;
            color: #d4af37;
            box-shadow: 0 4px 8px rgba(212, 175, 55, 0.2);
        }

        .scrollable-log {
            max-height: 400px;
            overflow-y: auto;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 4px;
        }
        .scrollable-log::-webkit-scrollbar { width: 8px; }
        .scrollable-log::-webkit-scrollbar-track { background: #050505; }
        .scrollable-log::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 4px; }
        
        .match-row:hover { background: #1a1a1a; }
        .match-fixture { width: 120px; font-weight: bold; color: #888; transition: color 0.2s ease; }
        .match-row:hover .match-fixture { color: #d4af37; }
        .match-result-text { color: #aaa; }
        .match-highlight { color: #d4af37; font-weight: bold; }

        .admin-trigger {
            position: fixed;
            bottom: 10px;
            right: 10px;
            color: #222; 
            cursor: pointer;
            font-size: 10px;
            transition: color 0.3s ease;
        }
        .admin-trigger:hover { color: #d4af37; }
        
        #loading_overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #050505;
            display: flex; justify-content: center; align-items: center;
            color: #d4af37; font-size: 1.5rem; z-index: 9999;
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body>

<div id="loading_overlay">syncing with cloud...</div>

<div class="container" id="main_app" style="opacity: 0; transition: opacity 0.5s;">
    <div class="left-col" id="admin_panel">
        <div class="card">
            <h2>add match result</h2>
            <div class="row">
                <div>
                    <label style="color:#d4af37;">team 1 (batting first)</label>
                    <select id="t1"></select>
                </div>
                <div>
                    <label>runs</label>
                    <input type="number" id="r1" min="0">
                </div>
                <div>
                    <label>wkts</label>
                    <input type="number" id="w1" min="0" max="10">
                </div>
                <div>
                    <label>balls</label>
                    <input type="number" id="b1" min="0" max="120" value="120">
                </div>
            </div>
            <div class="row">
                <div>
                    <label style="color:#d4af37;">team 2 (chasing)</label>
                    <select id="t2"></select>
                </div>
                <div>
                    <label>runs</label>
                    <input type="number" id="r2" min="0">
                </div>
                <div>
                    <label>wkts</label>
                    <input type="number" id="w2" min="0" max="10">
                </div>
                <div>
                    <label>balls</label>
                    <input type="number" id="b2" min="0" max="120" value="120">
                </div>
            </div>
            <div class="row">
                <div>
                    <label>top batter name</label>
                    <input type="text" id="bat_name" placeholder="e.g. kohli">
                </div>
                <div>
                    <label>runs scored</label>
                    <input type="number" id="bat_runs" min="0">
                </div>
            </div>
            <div class="row">
                <div>
                    <label>top bowler name</label>
                    <input type="text" id="bowl_name" placeholder="e.g. bumrah">
                </div>
                <div>
                    <label>wickets taken</label>
                    <input type="number" id="bowl_wkts" min="0" max="10">
                </div>
            </div>
            <button onclick="window.addMatch()">save match</button>
            <button class="danger" onclick="window.clearData()">reset tournament (danger)</button>
        </div>
        
        <div class="card">
            <h2>win predictor & form guide</h2>
            <div class="row">
                <div>
                    <select id="pred_t1"></select>
                </div>
                <div style="text-align: center; line-height: 35px; color: #d4af37; transition: transform 0.3s ease;">vs</div>
                <div>
                    <select id="pred_t2"></select>
                </div>
            </div>
            <button onclick="window.predictMatch()" class="action">predict</button>
            <p id="prediction_result" style="margin-top: 15px; font-weight: bold; color: #d4af37; text-align: center; transition: all 0.3s ease;"></p>
        </div>
    </div>

    <div class="right-col" id="view_panel" style="grid-column: 1 / -1;">
        <div class="groups-container">
            <div class="group-box">
                <h3>group a</h3>
                <div id="group_a_teams"></div>
            </div>
            <div class="group-box">
                <h3>group b</h3>
                <div id="group_b_teams"></div>
            </div>
        </div>

        <div class="card">
            <h2>points table</h2>
            <table>
                <thead>
                    <tr>
                        <th>team</th><th>p</th><th>w</th><th>l</th><th>t</th><th>pts</th><th>nrr</th><th>form</th><th>status</th>
                    </tr>
                </thead>
                <tbody id="ptable_body"></tbody>
            </table>
        </div>

        <div class="flex-split">
            <div class="card">
                <h2>orange cap</h2>
                <table>
                    <thead><tr><th>player</th><th>runs</th></tr></thead>
                    <tbody id="orange_body"></tbody>
                </table>
            </div>
            <div class="card">
                <h2>purple cap</h2>
                <table>
                    <thead><tr><th>player</th><th>wkts</th></tr></thead>
                    <tbody id="purple_body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="card full-width">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>tournament match log</h2>
            <span id="match_progress" style="color: #aaa; font-size: 0.9rem;"></span>
        </div>
        <div class="scrollable-log">
            <table>
                <thead>
                    <tr>
                        <th style="width: 60px;">m#</th>
                        <th class="match-fixture">fixture</th>
                        <th>result</th>
                    </tr>
                </thead>
                <tbody id="match_log_body"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="admin-trigger" onclick="window.unlockAdmin()">admin</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC_q2XGkzgWGVSX4_RSckQnQVrKNdVc6ek",
      authDomain: "rcpls4.firebaseapp.com",
      databaseURL: "https://rcpls4-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "rcpls4",
      storageBucket: "rcpls4.firebasestorage.app",
      messagingSenderId: "381635970086",
      appId: "1:381635970086:web:56bba7dd966d6cc8b6d2e7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'rcpl_tournament_data');

    const TEAMS = ['csk', 'mi', 'rcb', 'kkr', 'dc', 'rr', 'pbks', 'srh', 'lsg', 'gt'];
    const GROUP_A = ['kkr', 'mi', 'lsg', 'srh', 'dc'];
    const GROUP_B = ['csk', 'rcb', 'gt', 'pbks', 'rr'];
    const TOTAL_MATCHES_PER_TEAM = 14;
    
    let schedule = [];
    let batters = {};
    let bowlers = {};
    let isDataLoaded = false;

    function pushToCloud() {
        set(dbRef, {
            schedule: schedule,
            batters: batters,
            bowlers: bowlers
        });
    }

    onValue(dbRef, (snapshot) => {
        const data = snapshot.val();
        if (data) {
            schedule = data.schedule || [];
            batters = data.batters || {};
            bowlers = data.bowlers || {};
        } else {
            schedule = generateSchedule();
            batters = {};
            bowlers = {};
            pushToCloud(); 
        }
        
        if (!isDataLoaded) {
            initUI();
            isDataLoaded = true;
            document.getElementById('loading_overlay').style.opacity = '0';
            setTimeout(() => { document.getElementById('loading_overlay').style.display = 'none'; }, 500);
            document.getElementById('main_app').style.opacity = '1';
        }
        updateUI();
    });

    function generateSchedule() {
        let tempSchedule = [];
        let idCounter = 1;

        for (let i = 0; i < GROUP_A.length; i++) {
            for (let j = i + 1; j < GROUP_A.length; j++) {
                tempSchedule.push({ id: 0, t1: GROUP_A[i], t2: GROUP_A[j], played: false, result: null });
            }
        }
        for (let i = 0; i < GROUP_B.length; i++) {
            for (let j = i + 1; j < GROUP_B.length; j++) {
                tempSchedule.push({ id: 0, t1: GROUP_B[i], t2: GROUP_B[j], played: false, result: null });
            }
        }
        for (let i = 0; i < GROUP_A.length; i++) {
            for (let j = 0; j < GROUP_B.length; j++) {
                tempSchedule.push({ id: 0, t1: GROUP_A[i], t2: GROUP_B[j], played: false, result: null });
                tempSchedule.push({ id: 0, t1: GROUP_B[j], t2: GROUP_A[i], played: false, result: null });
            }
        }

        let finalSchedule = [];
        let success = false;
        let attempts = 0;

        while (!success && attempts < 500) {
            attempts++;
            let pool = [...tempSchedule];
            for (let i = pool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pool[i], pool[j]] = [pool[j], pool[i]];
            }

            finalSchedule = [];
            let lastTeams = [];
            let valid = true;

            while (pool.length > 0) {
                let matchIdx = pool.findIndex(m => !lastTeams.includes(m.t1) && !lastTeams.includes(m.t2));
                if (matchIdx !== -1) {
                    let m = pool.splice(matchIdx, 1)[0];
                    finalSchedule.push(m);
                    lastTeams = [m.t1, m.t2];
                } else {
                    valid = false; break;
                }
            }
            if (valid) success = true;
        }

        if (!success) finalSchedule = tempSchedule; 
        finalSchedule.forEach(m => m.id = idCounter++);
        return finalSchedule;
    }

    function initUI() {
        const selects = ['t1', 't2', 'pred_t1', 'pred_t2'];
        selects.forEach(id => {
            const el = document.getElementById(id);
            if(el) {
                el.innerHTML = '';
                TEAMS.forEach(t => {
                    let opt = document.createElement('option');
                    opt.value = t; opt.innerText = t.toUpperCase();
                    el.appendChild(opt);
                });
            }
        });
        if(document.getElementById('t2')) document.getElementById('t2').selectedIndex = 1;
        if(document.getElementById('pred_t2')) document.getElementById('pred_t2').selectedIndex = 1;

        document.getElementById('group_a_teams').innerHTML = GROUP_A.map(t => `<span class="team-pill">${t}</span>`).join('');
        document.getElementById('group_b_teams').innerHTML = GROUP_B.map(t => `<span class="team-pill">${t}</span>`).join('');
    }

    function calculateOvers(balls) { return Math.floor(balls / 6) + ((balls % 6) / 6.0); }
    function formatDisplayOvers(balls) { return Math.floor(balls / 6) + "." + (balls % 6); }

    window.addMatch = function() {
        const data = {
            t1: document.getElementById('t1').value,
            r1: parseInt(document.getElementById('r1').value) || 0,
            w1: parseInt(document.getElementById('w1').value) || 0,
            b1: parseInt(document.getElementById('b1').value) || 0,
            t2: document.getElementById('t2').value,
            r2: parseInt(document.getElementById('r2').value) || 0,
            w2: parseInt(document.getElementById('w2').value) || 0,
            b2: parseInt(document.getElementById('b2').value) || 0
        };

        if (data.t1 === data.t2) return alert("teams must be different");

        let slot = schedule.find(x => !x.played && ((x.t1 === data.t1 && x.t2 === data.t2) || (x.t1 === data.t2 && x.t2 === data.t1)));
        if (!slot) return alert("this matchup has already reached its maximum allowed matches based on group rules!");

        slot.played = true;
        slot.result = data;

        const batName = document.getElementById('bat_name').value.trim().toLowerCase();
        const batRuns = parseInt(document.getElementById('bat_runs').value) || 0;
        if (batName && batRuns > 0) batters[batName] = (batters[batName] || 0) + batRuns;

        const bowlName = document.getElementById('bowl_name').value.trim().toLowerCase();
        const bowlWkts = parseInt(document.getElementById('bowl_wkts').value) || 0;
        if (bowlName && bowlWkts > 0) bowlers[bowlName] = (bowlers[bowlName] || 0) + bowlWkts;

        pushToCloud();

        ['r1','w1','r2','w2','bat_name','bat_runs','bowl_name','bowl_wkts'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('b1').value = 120; document.getElementById('b2').value = 120;
    };

    window.clearData = function() {
        if(confirm("this will delete the database for everyone across the internet. proceed?")) {
            schedule = generateSchedule();
            batters = {};
            bowlers = {};
            pushToCloud();
        }
    };

    window.unlockAdmin = function() {
        let pass = prompt("enter admin password:");
        if (pass === "rcpl2026") {
            document.getElementById("admin_panel").style.display = "block";
            document.getElementById("view_panel").style.gridColumn = "auto";
        } else if (pass !== null) {
            alert("incorrect password.");
        }
    };

    function generateTableData() {
        let table = {};
        TEAMS.forEach(t => table[t] = { p:0, w:0, l:0, t:0, pts:0, rf:0, of:0, ra:0, oa:0, form: [] });
        let playedMatches = schedule.filter(s => s.played && s.result);
        
        playedMatches.forEach(s => {
            let m = s.result; 
            let o1 = calculateOvers(m.b1), o2 = calculateOvers(m.b2);
            if (table[m.t1] && table[m.t2]) {
                table[m.t1].p++; table[m.t2].p++;
                table[m.t1].rf += m.r1; table[m.t1].of += o1;
                table[m.t1].ra += m.r2; table[m.t1].oa += o2;
                table[m.t2].rf += m.r2; table[m.t2].of += o2;
                table[m.t2].ra += m.r1; table[m.t2].oa += o1;
                if (m.r1 > m.r2) {
                    table[m.t1].w++; table[m.t1].pts += 2; table[m.t1].form.push('W');
                    table[m.t2].l++; table[m.t2].form.push('L');
                } else if (m.r2 > m.r1) {
                    table[m.t2].w++; table[m.t2].pts += 2; table[m.t2].form.push('W');
                    table[m.t1].l++; table[m.t1].form.push('L');
                } else {
                    table[m.t1].t++; table[m.t1].pts += 1; table[m.t1].form.push('T');
                    table[m.t2].t++; table[m.t2].pts += 1; table[m.t2].form.push('T');
                }
            }
        });

        let arr = Object.keys(table).map(t => {
            let nrr = (table[t].of > 0 ? table[t].rf/table[t].of : 0) - (table[t].oa > 0 ? table[t].ra/table[t].oa : 0);
            return { team: t, ...table[t], nrr: nrr.toFixed(3) };
        });
        return arr.sort((a, b) => b.pts - a.pts || b.nrr - a.nrr);
    }

    function updateUI() {
        let standings = generateTableData();
        let tbody = document.getElementById('ptable_body');
        tbody.innerHTML = '';

        if (standings.length > 4) {
            let fourthPlacePts = standings[3].pts;
            standings.forEach(s => {
                let maxPossible = s.pts + ((TOTAL_MATCHES_PER_TEAM - s.p) * 2);
                if (s.p === TOTAL_MATCHES_PER_TEAM && s.pts >= fourthPlacePts) s.status = '<span class="tag q">q</span>';
                else if (maxPossible < fourthPlacePts && fourthPlacePts > 0) s.status = '<span class="tag e">e</span>';
                else s.status = '-';
            });
        }

        standings.forEach(s => {
            let formHtml = s.form.slice(-3).map(f => `<span class="tag form-${f.toLowerCase()}">${f.toLowerCase()}</span>`).join(' ');
            tbody.innerHTML += `<tr>
                <td style="color: #fff;"><b>${s.team.toUpperCase()}</b></td>
                <td>${s.p}</td><td>${s.w}</td><td>${s.l}</td><td>${s.t}</td>
                <td style="color: #d4af37;"><b>${s.pts}</b></td><td>${s.nrr}</td>
                <td>${formHtml || '-'}</td><td>${s.status || '-'}</td>
            </tr>`;
        });

        const sortCaps = (obj) => {
            if (!obj || typeof obj !== 'object') return [];
            return Object.entries(obj).sort((a,b) => b[1] - a[1]).slice(0,5);
        };
        
        document.getElementById('orange_body').innerHTML = sortCaps(batters).map(b => `<tr><td style="text-transform: capitalize;">${b[0]}</td><td style="color: #d4af37; font-weight: bold;">${b[1]}</td></tr>`).join('');
        document.getElementById('purple_body').innerHTML = sortCaps(bowlers).map(b => `<tr><td style="text-transform: capitalize;">${b[0]}</td><td style="color: #d4af37; font-weight: bold;">${b[1]}</td></tr>`).join('');
        
        let logTbody = document.getElementById('match_log_body');
        logTbody.innerHTML = '';
        let playedCount = 0;

        schedule.forEach(s => {
            let rowHtml = ``;
            if (s.played && s.result) {
                playedCount++;
                let m = s.result;
                let winStr = "match tied";
                if (m.r1 > m.r2) winStr = `<span class="match-highlight">${m.t1.toUpperCase()} won by ${m.r1 - m.r2} runs</span>`;
                else if (m.r2 > m.r1) winStr = `<span class="match-highlight">${m.t2.toUpperCase()} won by ${10 - (m.w2 || 0)} wickets</span>`;

                rowHtml = `<td class="match-result-text">${m.t1.toUpperCase()}: ${m.r1}/${m.w1} (${formatDisplayOvers(m.b1)}) &nbsp;|&nbsp; ${m.t2.toUpperCase()}: ${m.r2}/${m.w2} (${formatDisplayOvers(m.b2)}) &nbsp;—&nbsp; ${winStr}</td>`;
            } else {
                rowHtml = `<td style="color: #444; font-style: italic;">awaiting result</td>`;
            }
            logTbody.innerHTML += `<tr class="match-row"><td style="color: #666;">${s.id}</td><td class="match-fixture">${s.t1.toUpperCase()} vs ${s.t2.toUpperCase()}</td>${rowHtml}</tr>`;
        });

        document.getElementById('match_progress').innerText = `${playedCount} / 70 completed`;
        window.currentStandings = standings;
    }

    window.predictMatch = function() {
        const t1 = document.getElementById('pred_t1').value;
        const t2 = document.getElementById('pred_t2').value;
        if (t1 === t2) return document.getElementById('prediction_result').innerText = "select different teams.";

        let stats = window.currentStandings;
        let s1 = stats.find(s => s.team === t1);
        let s2 = stats.find(s => s.team === t2);

        if (!s1 || !s2 || (s1.p === 0 && s2.p === 0)) return document.getElementById('prediction_result').innerText = "not enough data yet.";

        const getFormScore = (formArr) => formArr.slice(-3).reduce((acc, val) => acc + (val==='W'?2:val==='T'?1:0), 0);
        let score1 = (s1.pts * 1.5) + (parseFloat(s1.nrr) * 5) + (getFormScore(s1.form) * 3);
        let score2 = (s2.pts * 1.5) + (parseFloat(s2.nrr) * 5) + (getFormScore(s2.form) * 3);
        let total = (score1 + score2) || 1; 
        
        let p1 = Math.max(10, Math.min(90, (score1 / total) * 100));
        document.getElementById('prediction_result').innerText = `${t1.toUpperCase()}: ${p1.toFixed(1)}%  |  ${t2.toUpperCase()}: ${(100 - p1).toFixed(1)}%`;
    }
</script>
</body>
</html>
